default:
  image: python:3.11
  tags:
    - village_help_portal

stages:
  - lint
  - format
  - type_check
  - security
  - test
  - coverage

lint:
  stage: lint
  script:
    - pip install -r requirements.txt
    - pip install ruff flake8 pylint vulture pyupgrade
    - ruff check .
    - flake8 . || true
    - pylint app.py || true
    - vulture . || true
    - pyupgrade --py311-plus app.py || true

format:
  stage: format
  script:
    - pip install -r requirements.txt
    - pip install ruff
    - ruff format --check .

type_check:
  stage: type_check
  script:
    - pip install -r requirements.txt
    - pip install mypy
    - mypy app.py || true

security:
  stage: security
  script:
    - pip install -r requirements.txt
    - pip install bandit semgrep pip-audit
    - bandit -r . || true
    - semgrep scan --config auto . || true
    - pip-audit || true

test:
  stage: test
  script:
    - pip install -r requirements.txt
    - pip install pytest
    - pytest || echo "No tests found"

coverage:
  stage: coverage
  script:
    - pip install -r requirements.txt
    - pip install pytest pytest-cov
    - pytest --cov=. --cov-report=xml --cov-fail-under=1 || true