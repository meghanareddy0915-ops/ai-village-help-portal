stages:
  - test
  - security

python-checks:
  image: python:3.11
  stage: test
  script:
    - pip install -r requirements.txt
    - pip install ruff mypy pytest bandit pip-audit
    - ruff check .
    - mypy app.py || true
    - pytest || true
    - bandit -r . || true
    - pip-audit || true

secret-scan:
  image: python:3.11
  stage: security
  script:
    - echo "Secret scanning placeholder"