default:
  image: ghcr.io/astral-sh/uv:python3.11-bookworm
  tags:
    - local-runner

stages:
  - lint
  - format
  - type_check
  - security
  - test
  - coverage

lint:
  stage: lint
  script:
    - uv sync --dev
    - uv run ruff check .
    - uv run flake8 . || true
    - uv run pylint app.py || true
    - uv run vulture . || true
    - uv run pyupgrade --py311-plus app.py || true

format:
  stage: format
  script:
    - uv sync --dev
    - uv run ruff format --check .

type_check:
  stage: type_check
  script:
    - uv sync --dev
    - uv run mypy app.py || true

security:
  stage: security
  script:
    - uv sync --dev
    - uv run bandit -r . || true
    - uv run semgrep scan --config auto . || true
    - uv run pip-audit || true

test:
  stage: test
  script:
    - uv sync --dev
    - uv run pytest || echo "No tests found"

coverage:
  stage: coverage
  script:
    - uv sync --dev
    - uv run pytest --cov=. --cov-report=xml --cov-fail-under=1 || true
