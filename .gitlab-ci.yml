stages:
  - lint
  - format
  - type_check
  - security
  - test
  - coverage

lint:
  image: python:3.11
  stage: lint
  script:
    - pip install ruff flake8 pylint vulture
    - ruff check .
    - flake8 . || true
    - pylint app.py || true
    - vulture . || true

format:
  image: python:3.11
  stage: format
  script:
    - pip install ruff
    - ruff format --check . || true

type_check:
  image: python:3.11
  stage: type_check
  script:
    - pip install mypy
    - mypy app.py || true

security:
  image: python:3.11
  stage: security
  script:
    - pip install bandit semgrep pip-audit
    - bandit -r . || true
    - semgrep scan --config auto . || true
    - pip-audit || true

test:
  image: python:3.11
  stage: test
  script:
    - pip install pytest
    - pytest || true

coverage:
  image: python:3.11
  stage: coverage
  script:
    - pip install pytest pytest-cov
    - pytest --cov=. --cov-report=xml --cov-fail-under=1 || true