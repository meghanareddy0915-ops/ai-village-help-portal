```yaml
stages:
  - lint
  - format
  - type_check
  - security
  - test
  - coverage

before_script:
  - pip install -r requirements.txt
  - pip install ruff mypy pytest pytest-cov bandit flake8 pylint vulture semgrep pyupgrade

lint:
  image: python:3.11
  stage: lint
  script:
    - ruff check .
    - flake8 . || true
    - pylint app.py || true
    - vulture . || true

format:
  image: python:3.11
  stage: format
  script:
    - ruff format --check .

type_check:
  image: python:3.11
  stage: type_check
  script:
    - mypy app.py || true

security:
  image: python:3.11
  stage: security
  script:
    - bandit -r . || true
    - semgrep scan --config auto . || true

test:
  image: python:3.11
  stage: test
  script:
    - pytest

coverage:
  image: python:3.11
  stage: coverage
  script:
    - pytest --cov=. --cov-report=xml --cov-fail-under=1